name: Test Ecosystem Plugins

on:
    push:
        branches:
            - "ecosystem/*"
    schedule:
        # “At 00:00.” https://crontab.guru/#0_0_*_*_*
        - cron: "0 0 * * *"
    workflow_dispatch: ~

permissions: read-all

jobs:
    test_ecosystem:
        name: Test Ecosystem Plugin (${{ matrix.plugin }})
        runs-on: ubuntu-latest

        strategy:
            matrix:
                plugin:
                    - "@eslint/css"
                    - "@eslint/json"
                    - "@eslint/markdown"
                    - "@eslint-community/eslint-plugin-eslint-comments"
                    - "@typescript-eslint/typescript-eslint"
                    - "eslint-plugin-unicorn"
                    - "eslint-plugin-vue"

        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"

            - name: Install Corepack latest
              if: matrix.plugin == '@typescript-eslint/typescript-eslint'
              run: |
                  npm install -g corepack@latest
                  corepack enable pnpm

            - run: npm install
            - continue-on-error: true
              id: tester
              run: npm run test:ecosystem -- --plugin ${{ matrix.plugin }}
            - if: steps.tester.outcome == 'failure' && github.ref_name == 'main'
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_CONTRIBUTORS_WEBHOOK }}
              uses: Ilshidur/action-discord@d2594079a10f1d6739ee50a2471f0ca57418b554 # 0.4.0
              with:
                  args: "Ecosystem tests failed for ${{ matrix.plugin }}."
