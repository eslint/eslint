    typescript_eslint:
        name: Test Ecosystem Plugin (@typescript-eslint/typescript-eslint)
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"
            - name: Install Corepack latest
              run: |
                  npm install -g corepack@latest
