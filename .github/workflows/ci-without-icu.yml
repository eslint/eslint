name: CI (without ICU)

# Verifies ESLint works on Node.js built without full ICU support.
# See: https://github.com/eslint/eslint/issues/20380
#
# Uses a pre-built Node.js binary (--with-intl=none) from the "no-icu-builds"
# GitHub Release, uploaded by the build-node-no-icu.yml workflow.
# This avoids a ~60-minute source build on every PR.

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

env:
    NODE_VERSION: "24.10.0"
    RELEASE_TAG: "no-icu-builds"

jobs:
    test_without_icu:
        name: Test (Node.js without ICU)
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - uses: actions/checkout@v6

            - name: Download pre-built Node.js (no ICU)
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  ASSET_NAME="node-no-icu-v${NODE_VERSION}-linux-x64.tar.xz"
                  echo "Downloading ${ASSET_NAME} from release ${RELEASE_TAG}"
                  gh release download "$RELEASE_TAG" \
                    --repo "$GITHUB_REPOSITORY" \
                    --pattern "$ASSET_NAME"
                  tar -xJf "$ASSET_NAME" -C "$HOME"
                  echo "$HOME/node-no-icu/bin" >> "$GITHUB_PATH"

            - name: Verify no-ICU runtime
              run: |
                  node -v
                  node -e "
                    if (process.versions.icu) {
                      console.error('ERROR: ICU is present (version: ' + process.versions.icu + ')');
                      console.error('This binary was not built with --with-intl=none.');
                      process.exit(1);
                    }
                    console.log('Confirmed: running without ICU (--with-intl=none).');
                  "

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: node Makefile mocha
