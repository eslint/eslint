name: CI (without ICU)

# Verifies ESLint works on Node.js built without full ICU support.
# See: https://github.com/eslint/eslint/issues/20380
#
# Modern Node.js binaries always embed full ICU, and there are no official
# no-ICU prebuilt binaries. This workflow builds Node.js from source with
# --with-intl=none to exercise the fallback code paths that avoid
# Unicode property escapes and Intl-dependent APIs.

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    test_without_icu:
        name: Test (Node.js without ICU)
        runs-on: ubuntu-latest
        timeout-minutes: 60

        env:
            NODE_VERSION: "22.15.0"

        steps:
            - uses: actions/checkout@v6

            - name: Cache Node.js build without ICU
              id: cache-node
              uses: actions/cache@v4
              with:
                  path: ~/node-no-icu
                  key: node-without-icu-${{ env.NODE_VERSION }}-${{ runner.os }}

            - name: Build Node.js with no-ICU
              if: steps.cache-node.outputs.cache-hit != 'true'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential python3 python3-pip
                  curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}.tar.xz" | tar -xJ
                  cd "node-v${NODE_VERSION}"
                  ./configure --with-intl=none --prefix="$HOME/node-no-icu"
                  make -j"$(nproc)"
                  make install

            - name: Add no-ICU Node.js to PATH
              run: echo "$HOME/node-no-icu/bin" >> "$GITHUB_PATH"

            - name: Verify no-ICU runtime
              run: |
                  node -v
                  node -e "
                    const icu = process.versions.icu;
                    console.log('ICU version:', icu || '(none)');

                    // Verify this is NOT a full-ICU build by checking locale data
                    const hasFullLocaleData = (() => {
                      try {
                        // Full ICU knows about many locales; no-ICU typically only has English
                        return new Intl.DateTimeFormat('zh-Hans-CN').resolvedOptions().locale.startsWith('zh');
                      } catch {
                        return false;
                      }
                    })();

                    if (hasFullLocaleData) {
                      console.error('WARNING: This build appears to have full ICU locale data.');
                      console.error('The test may not exercise fallback code paths.');
                    } else {
                      console.log('Confirmed: running with limited ICU data (no-icu).');
                    }
                  "

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: node Makefile mocha
